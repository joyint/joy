category: science
description: Quotes from scientists, thinkers, and innovators
entries:
- text: "Imagination is more important than knowledge."
  author: Albert Einstein
- text: "The important thing is not to stop questioning."
  author: Albert Einstein
- text: "If I have seen further it is by standing on the shoulders of giants."
  author: Isaac Newton
- text: "Nothing in life is to be feared, it is only to be understood."
  author: Marie Curie
- text: "The good thing about science is that it's true whether or not you believe in it."
  author: Neil deGrasse Tyson
- text: "I think, therefore I am."
  author: Rene Descartes
- text: "The only true wisdom is in knowing you know nothing."
  author: Socrates
- text: "Science is organized knowledge. Wisdom is organized life."
  author: Immanuel Kant
- text: "The measure of intelligence is the ability to change."
  author: Albert Einstein
- text: "An expert is a person who has made all the mistakes that can be made in a very narrow field."
  author: Niels Bohr
- text: "If you can't explain it simply, you don't understand it well enough."
  author: Albert Einstein
- text: "I have not failed. I've just found 10,000 ways that won't work."
  author: Thomas Edison
- text: "The saddest aspect of life right now is that science gathers knowledge faster than society gathers wisdom."
  author: Isaac Asimov
- text: "Somewhere, something incredible is waiting to be known."
  author: Carl Sagan
- text: "Research is what I'm doing when I don't know what I'm doing."
  author: Wernher von Braun
- text: "The universe is under no obligation to make sense to you."
  author: Neil deGrasse Tyson
- text: "We are all now connected by the Internet, like neurons in a giant brain."
  author: Stephen Hawking
- text: "The science of today is the technology of tomorrow."
  author: Edward Teller
- text: "In the middle of difficulty lies opportunity."
  author: Albert Einstein
- text: "It is strange that only extraordinary men make the discoveries, which later appear so easy and simple."
  author: Georg C. Lichtenberg
- text: "Equipped with his five senses, man explores the universe around him and calls the adventure Science."
  author: Edwin Hubble
- text: "The greatest enemy of knowledge is not ignorance, it is the illusion of knowledge."
  author: Daniel J. Boorstin
- text: "A scientist in his laboratory is not a mere technician: he is also a child confronting natural phenomena that impress him as though they were fairy tales."
  author: Marie Curie
- text: "The most incomprehensible thing about the world is that it is comprehensible."
  author: Albert Einstein
- text: "Two things are infinite: the universe and human stupidity; and I'm not sure about the universe."
  author: Albert Einstein
- text: "The reward of the young scientist is the emotional thrill of being the first person in the history of the world to see something or to understand something."
  author: Cecilia Payne-Gaposchkin
- text: "Do not fear mistakes. There are none."
  author: Miles Davis
- text: "Logic will get you from A to B. Imagination will take you everywhere."
  author: Albert Einstein
- text: "Not only is the universe stranger than we imagine, it is stranger than we can imagine."
  author: J.B.S. Haldane
- text: "What we know is a drop, what we don't know is an ocean."
  author: Isaac Newton
- text: "The best way to have a good idea is to have a lot of ideas."
  author: Linus Pauling
- text: "Everything should be made as simple as possible, but not simpler."
  author: Albert Einstein
- text: "No amount of experimentation can ever prove me right; a single experiment can prove me wrong."
  author: Albert Einstein
- text: "The important thing in science is not so much to obtain new facts as to discover new ways of thinking about them."
  author: William Lawrence Bragg
- text: "One, remember to look up at the stars and not down at your feet."
  author: Stephen Hawking
- text: "Extraordinary claims require extraordinary evidence."
  author: Carl Sagan
- text: "The greatest scientists are artists as well."
  author: Albert Einstein
- text: "I was taught that the way of progress was neither swift nor easy."
  author: Marie Curie
- text: "We are just an advanced breed of monkeys on a minor planet of a very average star. But we can understand the universe. That makes us something very special."
  author: Stephen Hawking
- text: "I seem to have been only like a boy playing on the seashore, diverting myself now and then."
  author: Isaac Newton
- text: "The day science begins to study non-physical phenomena, it will make more progress in one decade than in all the previous centuries of its existence."
  author: Nikola Tesla
- text: "In questions of science, the authority of a thousand is not worth the humble reasoning of a single individual."
  author: Galileo Galilei
- text: "If we knew what it was we were doing, it would not be called research, would it?"
  author: Albert Einstein
- text: "Chaos is merely order waiting to be deciphered."
  author: Jose Saramago
- text: "The beginning of wisdom is the definition of terms."
  author: Socrates
- text: "All models are wrong, but some are useful."
  author: George Box
- text: "The more I learn, the more I realize how much I don't know."
  author: Albert Einstein
- text: "Be less curious about people and more curious about ideas."
  author: Marie Curie
- text: "Science is not only a disciple of reason but, also, one of romance and passion."
  author: Stephen Hawking
- text: "The world is full of obvious things which nobody by any chance ever observes."
  author: Arthur Conan Doyle
- text: "Prediction is very difficult, especially about the future."
  author: Niels Bohr
- text: "I am among those who think that science has great beauty."
  author: Marie Curie
- text: "Doubt is not a pleasant condition, but certainty is absurd."
  author: Voltaire
- text: "The only way to do great work is to love what you do."
  author: Steve Jobs
