description: Move config defaults from Config::default() serialization to a static data/config.defaults.yaml template. Register as EmbeddedFile in the sync mechanism so joy init and joy ai check/setup can detect outdated defaults and update them. project.yaml stays struct-generated (user-owned, project-specific data).
