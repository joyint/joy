description: |-
  Currently `joy project member add <ID>` without `--capabilities` defaults to `MemberCapabilities::All` (crates/joy-cli/src/commands/project.rs:457-458), silently granting `manage` and `delete` to every new member.

  Change the default to the work + create/assign set: `conceive,plan,design,implement,test,review,document,create,assign`. `manage` and `delete` must then be granted explicitly via `--capabilities`.

  Rationale: principle of least privilege. The current default is a trap -- narrowing capabilities after the fact requires a direct YAML edit (no CLI path exists), which breaks the attestation because `signed_fields.capabilities` and `member.capabilities` diverge.

  Acceptance: default MemberCapabilities in the add command is `Specific({conceive, plan, design, implement, test, review, document, create, assign})`. Tests updated. Help text for `--capabilities` reflects the new default.
