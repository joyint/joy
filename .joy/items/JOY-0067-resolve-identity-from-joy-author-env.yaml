  text: 'When AI members exist and no JOY_AUTHOR/--author is set, show a yellow warning on write operations: ''This project has AI members but no identity override is set. Actions are attributed to <git-email> (git config). Set JOY_AUTHOR or use --author for explicit identity.'' Warning color: yellow (not red), to distinguish from errors.'
