  date: 2026-03-27T18:54:16.024169310Z
  text: 'Plan: 1) Add resolve_identity() to joy-core that checks JOY_AUTHOR env var, validates against project members, falls back to git email. 2) If JOY_AUTHOR is an ai:* member, return both the AI identity and the git email as delegator. 3) Warn (yellow) on write ops when AI members exist but no override is set. 4) Replace direct vcs::user_email() calls in commands with resolve_identity().'
