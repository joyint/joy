description: joy show displays which capabilities an item requires (from type defaults), which are optional, who is assigned to each, and the effective interaction level. Shows actionable hints for unassigned required capabilities.
comments:
- author: horst.schwarz@joydev.com
  date: 2026-03-25T18:06:40.976532568Z
  text: |-
    Design decisions from planning session 2026-03-25:

    joy show must visually separate item data (from YAML) and derived data (from other sources). Capabilities are now stored in the item YAML, so they appear in the main section. Jobs (from .joy/jobs/) appear in a footer section below a separator.

    Layout:
      [Item data: type, status, priority, assignee, capabilities, description]
      ----
      [Footer: Jobs from .joy/jobs/, matched by item ID]

    No mixing of stored and derived data in the same visual block. The footer makes clear that jobs are external references, not part of the item file.
- author: horst.schwarz@joydev.com
  date: 2026-03-25T18:53:24.873299318Z
  text: 'Plan: Add capabilities line to joy show output in the main item section. Simple flat list, no footer yet (jobs come with JOY-0031). Format: ''Capabilities: plan, implement, review''. Only shown when capabilities are present.'
- author: horst.schwarz@joydev.com
  date: 2026-03-25T18:54:17.945633787Z
  text: 'Done. Capabilities shown in joy show main section as ''Capabilities: plan, implement, review''. Only displayed when capabilities are present (backward-compatible with existing items). Jobs footer deferred to JOY-0031.'
