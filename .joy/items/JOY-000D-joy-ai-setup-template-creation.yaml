title: 'joy ai setup: template creation defaults to N instead of Y'
type: bug
status: closed
priority: medium
effort: 1
created: 2026-03-20T19:04:39.841298855Z
updated: 2026-03-20T20:48:27.343265925Z
comments:
- author: horst.schwarz@joydev.com
  date: 2026-03-20T19:04:45.821013704Z
  text: 'When joy ai setup detects missing docs it asks ''Create template? [y/N]'' with default N. A user who just presses Enter through the prompts ends up without docs, which degrades the AI experience. Since someone running joy ai setup explicitly wants AI integration, the docs are essential. Default should be Y: ''Create template? [Y/n]''.'
