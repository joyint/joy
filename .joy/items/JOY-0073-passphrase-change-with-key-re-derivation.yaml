  text: 'Plan: New ''joy auth passphrase'' subcommand. Prompts for current passphrase (verifies via passphrase-derives-public_key check), prompts for new passphrase (validates length), derives fresh keypair from (new passphrase, fresh salt), writes member.public_key and member.salt, invalidates existing session. Attestation unaffected (public_key not in signed_fields, so signature remains valid). Single write, auto-git-add. Supports non-interactive --passphrase and --new-passphrase flags for scripting/tests.'
