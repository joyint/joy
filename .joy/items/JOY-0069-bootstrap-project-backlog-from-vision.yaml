description: 'AI command (e.g. joy ai bootstrap or joy ai plan --from-vision) that reads the project vision and generates an initial roadmap: milestones, epics, stories, tasks, and decisions. Supports direct creation or interactive mode where the user confirms each proposed item. Completes the vision-to-backlog pipeline: joy vision init (template) -> joy vision init --interactive (interview) -> joy ai vision (AI-generated vision) -> joy ai bootstrap (AI-generated backlog from vision). Fits into MS-05 (Agent Mode).'
