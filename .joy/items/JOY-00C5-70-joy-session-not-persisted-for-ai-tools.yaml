description: 'joy auth --token outputs export JOY_SESSION for eval, but AI tools run each command in a separate subshell. Environment variables do not persist. Fix: joy ai setup writes JOY_SESSION into each tool''s settings (settings.json env block or .env file). The session ID is deterministic, so it can be computed at setup time.'
