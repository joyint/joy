description: 'Bidirectional sync between Joy items and GitHub Projects/Issues on joyint.com. Use cases: (1) Migration from GitHub Projects to Joy with initial import. (2) Mirror mode where Joy is source of truth but GitHub Projects reflects status for external stakeholders (open source, customers). (3) Hybrid workflow where developers use Joy CLI and PMs use GitHub Projects. Natural fit for BYOG users with repos on GitHub. Commercially licensed as a joyint.com platform feature.'
