  text: |-
    Budget pre-checks implemented in Guard::check() for StartJob actions:
    - If member has max_cost_per_job configured and estimated_cost exceeds it -> Deny
    - At or below limit -> Allow
    - No limit configured -> Allow (no restriction)
    - No estimated cost provided -> Allow (can't pre-check unknown costs)
    - 4 new unit tests: within_limit, over_limit, no_limit, no_estimate
