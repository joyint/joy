  text: 'Plan: (1) Add git_version() to check git is installed and parse version. Minimum: 2.0. (2) Add write operations to GitVcs: add(paths), commit(message), tag_annotated(name, body), push(remote, branch), push_tag(remote, tag). (3) Add forge detection: parse_forge_from_remote(url) returns GitHub/GitLab/Gitea/Unknown. Check gh CLI availability with version. (4) All errors use JoyError with context (which command failed, what the output was).'
