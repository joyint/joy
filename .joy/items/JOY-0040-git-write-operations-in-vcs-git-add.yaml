description: 'Extend the VCS trait with write operations: add (stage files), commit (with message), tag (annotated with body), push (branch + tags). Continue using std::process::Command (no git2/gix crate). Add version check: verify git is installed and meets minimum version (2.x). Clear error messages if git is missing or too old. Also add forge detection: check for gh CLI, parse git remote URL to determine forge type (github/gitlab/gitea). All errors follow ADR-015 diagnostic format.'
