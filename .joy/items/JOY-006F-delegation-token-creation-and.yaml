  text: |-
    Delegation token system implemented:

    Core (auth/token.rs):
    - DelegationClaims: ai_member, delegated_by, project_id, created, expires
    - DelegationToken: claims + Ed25519 signature
    - create_token, validate_token, encode/decode (joy_t_<base64> format)
    - is_token() helper for prefix detection
    - 8 unit tests (create/validate, expiry, wrong project, tampered, encode/decode, wrong key)

    CLI (joy auth create-token):
    - joy auth create-token <ai-member> [--ttl <hours>] [--passphrase <pw>]
    - Requires manage capability + authenticated session
    - Validates AI member prefix (ai:*) and registration
    - Outputs token string for --token flag usage
    - 5 integration tests

    Token is passed to AI agents via --token flag (not env var).
    Dependencies: base64ct added for portable encoding.
