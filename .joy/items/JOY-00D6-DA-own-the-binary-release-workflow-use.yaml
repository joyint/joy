description: |-
  ## Goal

  Stop letting cargo-dist's auto-generated workflow own the release flow.
  Write a hand-maintained release workflow that uses cargo-dist's 'dist
  build' as a build subroutine (cross-compile + installer scripts) but
  controls the upload step ourselves. Result: no conflict with joy's
  existing forge-release prompt; binaries get uploaded to whichever
  GitHub release exists (joy-created or new).

  ## Scope

  1. Delete cargo-dist's auto-generated .github/workflows/release.yml.
  2. Disable CI workflow generation in dist-workspace.toml (so a future
     'dist generate' does not re-create the file).
  3. Add hand-written .github/workflows/release.yml: matrix build per
     target (linux x86_64+aarch64, macos x86_64+aarch64, windows x86_64),
     plus a global installer-script build, then an upload job that uses
     'gh release upload --clobber' on an existing release or 'gh release
     create' if none exists.
  4. Add 'just release-binaries' recipe for local equivalent.
  5. joy's release.rs is NOT touched. The '[y/N]' forge-release prompt
     stays exactly as it is.
