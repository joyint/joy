  text: |-
    Guard is Joy's centralized runtime validation layer (Guardianship pillar of AI Governance). It intercepts all write operations and enforces the Trust Model at execution time.

    Architectural decision: Guard lives as a joy-core::guard module, not as a separate subproject. Rationale:
    - Guard enforces Joy's process model (capabilities, gates, members) -- no Joy, no Guard
    - All consumers (joy-cli, platform/server, app) already depend on joy-core
    - Jot does not need Guard (no capabilities, no AI members, no gates)
    - Judge (separate repo) communicates with Guard via event log format, not shared code
    - Avoids cross-repo coordination overhead with no benefit

    Design principles:
    - Passthrough for simple setups (solo, no AI members) -- zero overhead
    - Progressive activation as members and gates are added (dimmers, not switches)
    - Single validation point for all write operations
    - Produces structured enforcement events in the event log (for Judge to consume)

    Existing checks to consolidate into Guard:
    - Gate enforcement (allow_ai, requires_role, requires_ci) -- currently in status command
    - Capability validation -- currently in add/comment commands
    - Member permission checks -- scattered across commands

    New checks Guard enables:
    - Prompt injection resilience (JOY-0011)
    - Budget pre-checks before job start
    - Sandbox enforcement for AI agents
    - Input validation for AI-authored content

    ADR-021 to be created.
