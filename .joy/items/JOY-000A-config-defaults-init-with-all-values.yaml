id: JOY-000A
title: 'Config defaults: init with all values, code fallback, auto-update on new keys'
type: story
status: new
priority: high
size: 5
created: '2026-03-20T17:21:59.801625490Z'
updated: '2026-03-20T17:22:08.191690553Z'
comments:
- author: horst.schwarz@joydev.com
  date: '2026-03-20T17:22:08.191690069Z'
  text: 'Three parts: (1) joy init writes config.yaml with all known default values, not a minimal file. (2) joy config get uses fallback chain: config file -> environment -> code default. Never returns exit 1 for known keys. (3) On tool update (any joy command), automatically append new config keys with their defaults to existing config.yaml. No explicit refresh command needed -- users would forget it. This also fixes the UX issue where AI tools see ''Error: Exit code 1'' when querying unset but known config keys.'
