description: |-
  ## Problem

  `joy ai init` creates docs at hard-coded paths (`docs/dev/architecture/README.md`, `docs/dev/vision/README.md`, `CONTRIBUTING.md`). When Joy is initialized in an existing repo, this collides with established doc structures (e.g. `ARCHITECTURE.md` in root, `docs/architecture/`, etc.) and forces an invasive layout change.

  ## Solution

  Make doc paths configurable in `project.yaml`. AI instructions reference them generically (`docs.architecture`, `docs.vision`, `docs.contributing`) so no template sync is needed when paths change - the instructions stay the same and Joy resolves the paths at runtime via `joy project`.

  ## joy ai init flow

  1. Scan known candidates (`ARCHITECTURE.md`, `docs/architecture/**`, `docs/dev/architecture/**`, `CONTRIBUTING.md` in root, etc.) and offer matches as the suggested path.
  2. If nothing found, propose the current default path; allow custom input.
  3. If the entered path does not exist, optionally create a template stub.

  ## Flag-based mode

  Support `joy ai init --architecture <path> --vision <path> --contributing <path>` so users get native shell completion (clap can generate completions natively). Interactive mode stays simple (default + manual input + existence check) without a custom readline implementation.

  ## Tradeoffs

  - One level of indirection more (instructions read paths from project.yaml instead of hard-coding them), but no template-sync problem and no collision with existing docs.
  - Pure interactive users tab less, but flag-based mode covers the power-user/scripted case where completion matters most.
