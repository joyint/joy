description: 'Jot is a personal todo CLI sharing joy-core as its foundation. jot-core extends Item via serde flatten with recurrence (RRULE), due_date and reminder are on the base Item. CLI commands: jot add, jot done, jot ls, jot show. Stores todos as YAML in .jot/ directory, syncs via Git. Crates: jot-core (MIT), jot-cli (MIT).'
