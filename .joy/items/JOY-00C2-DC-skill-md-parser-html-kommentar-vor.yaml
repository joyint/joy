    ## Problem

    Die von Joy generierte SKILL.md begann mit einem HTML-Kommentar VOR dem YAML-Frontmatter:



    Qwen Codes Parser erwartet aber, dass die Datei direkt mit `---` beginnt (Zeile 1, Zeichen 1). Der Regex im Parser ist:



    Das `^` bedeutet 'Anfang der Datei' – der HTML-Kommentar davor hat das Parsing verhindert.

    ## Lösung

    Den HTML-Kommentar NACH das Frontmatter verschieben:



    ## Betroffene Komponente

    Joy CLI: SKILL.md Template-Generierung (ai setup / skill export)

    ## Testfall

    1. Joy Skill generieren lassen
    2. In ~/.qwen/skills/ kopieren
    3. Qwen Code neu starten
    4. /skills joy sollte den Skill laden
