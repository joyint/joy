  text: |-
    All CLI write commands wired through Guard:

    Commands updated (10 files):
    - add.rs, comment.rs, status.rs, assign.rs (with --author -> enforce_as)
    - edit.rs, rm.rs, deps.rs, milestone.rs, release.rs, project.rs (enforce)

    Convenience functions added to guard.rs:
    - enforce(root, action, target) -- one-shot for commands without --author
    - enforce_as(root, action, target, identity) -- for commands with --author

    All warn_unless_capable() calls replaced. capabilities.rs still exists but
    is no longer called from any CLI command.

    Integration tests: 26 BATS tests covering all guard scenarios:
    - Solo (no restrictions), AI acceptance gate, AI manage block
    - Developer capability checks, event log verification
    - Unregistered member, all write commands, shortcuts
