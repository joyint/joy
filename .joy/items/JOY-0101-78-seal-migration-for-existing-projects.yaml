description: 'One-time migration for projects that exist before this feature lands. A manage member runs ''joy project seal'' (or automatic prompt on first joy auth after upgrade) which signs attestations for all existing members using the running manage member''s identity key. Founder identification: the first member in project.yaml (chronologically by created timestamp or by position). After seal, all members are attested; the feature is active.'
