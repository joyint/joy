description: 'Sync via git push/pull to a configured remote. CLI users sync directly via Git -- no server needed. Support --push, --pull, --auto flags. For BYOG (Bring Your Own Git): users can sync to GitHub, Gitea, or joyint.com. joyint.com users get Git hosting included.'
