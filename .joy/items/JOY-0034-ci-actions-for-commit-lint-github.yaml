description: Wrapper around just lint-commits for each CI platform. GitHub Actions, GitLab CI job, and Gitea Actions each have different PR/MR branch semantics. Each needs a platform-specific wrapper that determines the base branch and calls just lint-commits. Originated from JOY-0023.
