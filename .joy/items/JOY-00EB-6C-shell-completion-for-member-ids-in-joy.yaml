  text: 'Shell completion added: complete_ai_member in complete.rs reads project.yaml and emits AI member ids filtered by prefix. Wired into TokenAddArgs.member and TokenRmArgs.member via #[arg(add = ArgValueCompleter::new(...))]. 4 new unit tests on the pure filter helper (AI-prefix filtering, prefix matching, sorted output, empty no-match). Dynamic dispatch goes through the existing CompleteEnv in main.rs - no new setup required; users already following the completions docs get the new completer automatically.'
