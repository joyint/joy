description: 'Fix the existing shell completer for member IDs: it currently stops at the colon in IDs like ai:claude@joy because of word-boundary handling. Audit the completer registration introduced in JOY-00EB-6C and apply it consistently to every flag and positional argument that accepts a member ID across joy assign, joy auth, joy project member, and the new -m/--members filter. Tests verify completion through the colon for both human (foo@bar.com) and AI (ai:tool@joy) IDs.'
