  text: |-
    Configurable gates in project.yaml (dimmers, not switches):

    gates:
      review -> closed:
        allow_ai: false
        requires_role: approver

    Without explicit gate config = no restrictions (default for solo projects).

    joy project displays the workflow with gate status:
    - Wide terminal: ASCII flow diagram with gates inline
    - Narrow terminal: vertical stack with gate markers
    - Inactive gates: dimmed/grey
    - Active gates: warning color

    Replaces the hardcoded AI acceptance gate from JOY-0082.
