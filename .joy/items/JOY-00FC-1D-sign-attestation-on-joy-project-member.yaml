description: When a manage member runs 'joy project member add <email>', joy produces an attestation signed by the acting member's passphrase-derived identity key and writes it into the new member's attestation field. Signature covers email, capabilities, otp_hash (if any). Requires the acting member's passphrase to produce the signature (same UX as joy auth token add).
