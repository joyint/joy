  text: 'Plan: Extend ''joy project member add'' to: (1) require --passphrase of the acting manage member, (2) generate a random OTP, store Argon2id hash in otp_hash, print the OTP to stdout for out-of-band delivery, (3) sign attestation over email + capabilities + otp_hash using the acting member''s identity key, (4) write attestation to the new member''s entry. Tightly coupled with JOY-0072 (OTP redemption flow).'
