  text: 'Solution: (1) Make acronym required at init, store in project.yaml. (2) Change ID generation: items use ACRONYM-XXXX (hex), milestones use ACRONYM-MS-XX (hex). Drop EP-/IT- distinction. (3) Load acronym from project.yaml for all ID-generating operations. (4) Update file naming, cross-references, tests, snapshots, docs. (5) Add joy migrate command or auto-migrate existing items on first access.'
