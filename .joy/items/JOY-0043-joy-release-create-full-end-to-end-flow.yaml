description: 'Wire everything together: joy release create <bump> --full reads forge from project.yaml, performs version bump (JOY-0041), git add/commit/tag/push via VCS (JOY-0040), optional forge release with confirmation. Replaces all justfile release bash scripts with a one-liner. joy init detects forge from remote URL and proposes it to user during setup/onboarding.'
