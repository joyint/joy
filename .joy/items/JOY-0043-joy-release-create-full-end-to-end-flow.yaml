  date: 2026-03-23T07:20:58.329588202Z
  text: 'Plan: (1) Add --full flag to CreateArgs in release.rs. (2) When --full: after joy release YAML is created, read release.version-files from project.yaml and bump versions (version_bump::bump_all). (3) Git ops via vcs: add_all, commit with [no-item], tag_annotated with markdown notes, push_with_tags. (4) Forge release via forge::from_config if user confirms. (5) All checks upfront: git version, clean tree, forge auth.'
