description: 'Bidirectional sync between Joy items and GitLab Issues/Boards/Epics on joyint.com. Same use cases as GitHub (JOY-006A) and Gitea (JOY-006B) sync: migration, mirror mode, hybrid workflow. GitLab has Issues, Boards, Milestones, Epics (Premium), Labels, and a comprehensive REST + GraphQL API. Especially relevant for enterprise customers where GitLab is widely adopted. Commercially licensed as a joyint.com platform feature.'
