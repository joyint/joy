description: 'Opt-in gates on status transitions: requires_capability (transition needs assigned member with capability), requires_ci (CI must pass), allow_ai (can an agent fulfil this gate). Gates are configured per transition in project.yaml. Without gates, all transitions are allowed (current behavior). Gates are the strictness dial from solo (no gates) to enterprise (full enforcement).'
