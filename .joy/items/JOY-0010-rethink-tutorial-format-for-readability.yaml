  text: 'Current tutorial uses a man-page-inspired plaintext format. Issues: (1) renders
    poorly on GitHub (no markdown formatting), (2) not pleasant in a text editor,
    (3) lacks color/highlighting even in terminal compared to modern colored man pages.
    Consider: Markdown for GitHub/editor readability, or a proper man page with troff/mdoc
    for terminal rendering, or both (Markdown source, generate man page from it).
    The tutorial is shown via ''joy tutorial'' so the CLI could render Markdown with
    terminal formatting.'
