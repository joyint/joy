  text: |-
    Ed25519 identity keypair implemented in auth/sign.rs:
    - IdentityKeypair: from DerivedKey (32-byte seed), sign, zeroed on drop
    - PublicKey: verify, hex roundtrip, stored in project.yaml per member
    - Member model extended: public_key, salt, otp_hash (all Option, backward compatible)
    - Member::new() constructor for clean initialization
    - 5 unit tests (deterministic, sign/verify roundtrip, wrong message, wrong key, hex roundtrip)
