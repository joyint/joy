comments:
- author: ai:claude@joy
  date: 2026-03-28T09:48:22.946224688Z
  text: 'AI agents currently prefix joy commands with JOY_AUTHOR env var (e.g. JOY_AUTHOR="ai:claude@joy" joy close ...). This breaks the shell permission model because the allowed command is "joy", not "JOY_AUTHOR=... joy". Fix: update AI instructions and skill to use --author flag instead (e.g. joy close JOY-0005 --author ai:claude@joy).'
- author: ai:claude@joy
  date: 2026-03-28T12:33:37.310363535Z
  text: Superseded by JOY-0088 which removed JOY_AUTHOR entirely. The env var no longer exists in the codebase -- --author is the only identity override mechanism.
