  text: '[x] ensure_gitignore in init.rs writes only Joy base entries (config, credentials, ai, hooks, capabilities). [x] joy ai setup extends the gitignore block with entries for each actually configured tool. [x] update_gitignore_block is a public API in joy-core for atomic block replacement. [x] TOOL_GITIGNORE_ENTRIES maps tool IDs to their gitignore paths. [x] Unconfigured tools are not gitignored.'
