description: |-
  When no active session exists, joy auth status prints 'No active session for ...' but exits with code 0. Scripts checking the exit code (e.g. just auth-all in the joyint umbrella) treat this as 'already authenticated' and skip the actual authentication, leading to later guard-denied errors during downstream operations.

  Expected: exit 1 when there is no active session (or session expired, or auth not initialised). This matches conventional CLI status semantics (0 = healthy, non-zero = not healthy) and lets shell scripts rely on the exit code as an authentication gate.
