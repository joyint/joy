description: 'Bidirectional sync between Joy items and Gitea Projects/Issues on joyint.com. Same use cases as GitHub Projects sync (JOY-006A): migration, mirror mode, hybrid workflow. Gitea has Projects (Kanban boards at repo/org/user level), issues with milestones, labels, due dates, dependencies, and a REST API at /api/v1/. Especially relevant since BYOG explicitly positions Gitea as an alternative to GitHub. Commercially licensed as a joyint.com platform feature.'
