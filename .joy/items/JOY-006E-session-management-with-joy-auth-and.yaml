  text: |-
    Session management implemented:

    Core (auth/session.rs):
    - SessionClaims: member, project_id, created, expires
    - SessionToken: claims + Ed25519 signature (hex)
    - create_session, validate_session, save/load/remove_session
    - Session files: ~/.config/joy/sessions/<project-id>.json
    - Default TTL: 24h
    - 5 unit tests (create/validate, expired, wrong project, tampered, save/load roundtrip)

    CLI:
    - joy auth init -- generate salt, prompt passphrase, derive keypair, register public key, create session
    - joy auth -- enter passphrase, verify against registered public key, create session
    - joy auth status -- show session state (active/expired/none)
    - joy deauth -- end session (remove session file)

    Dependencies: rpassword added to joy-cli for passphrase prompts.
