  text: 'The Joy skill prompt instructs the AI to suggest a size (1-7) for new items, but in practice the AI skips it. The skill planning section mentions size but the item creation section does not explicitly remind the AI to include --size in the joy add call. Fix: add explicit size guidance to the ''Planning and creating items'' section of the skill.'
