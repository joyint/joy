description: 'Make ''joy <cmd> help'' work for every command, matching the AWS/gcloud convention. Currently joy follows the git-school (only ''joy help <cmd>'' and ''joy <cmd> --help''). Observation justifies the change: users repeatedly try ''joy ls help''. Implementation: add a Help subcommand variant under each command''s clap derive, delegating to the same renderer as --help. Output must be byte-identical between ''joy ls help'', ''joy help ls'', and ''joy ls --help''. Document the convention in CONTRIBUTING.md. Tests assert all three forms produce the same output for ls, board, roadmap, show, add, edit, comment, project, config, auth, ai, release.'
