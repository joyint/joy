description: 'Add a dynamic shell completer for item IDs (joy show, edit, comment, start, close, submit, reopen, assign, deps, ...). Read .joy/items/*.yaml at completion time and match against three rules in order: (1) acronym prefix (J -> JOY-, JI-), (2) numeric prefix (00 -> all JOY-00xx), (3) hex chunk in the shard suffix, case-insensitive (AA or aa -> JOY-00AA-xx). Single match auto-completes; multiple matches list. Naive scan is fine for current scale; revisit with an index when projects exceed a few thousand items.'
