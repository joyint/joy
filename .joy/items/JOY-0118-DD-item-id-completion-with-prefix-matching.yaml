  text: '[x] Replaced complete_item_id''s plain starts_with check with matches_item_id, which applies three rules in order: full-ID case-insensitive prefix, post-acronym (after first dash) prefix, post-acronym substring. [x] Examples now working: J -> JOY-/JI-, 00 -> all JOY-00xx, AA/aa -> JOY-00AA-xx, MS -> milestones, JOY-00 -> all JOY-00xx. [x] 6 new unit tests cover acronym prefix, numeric prefix, hex chunk case-insensitive, milestone prefix, no-match, empty-prefix-matches-all. [x] Performance: still scans only filename stems, no yaml read; naive linear scan is fine for current scale (sub-300 items). The ''index when projects exceed a few thousand items'' note in the story description remains the right next step but is not needed yet. [x] All commands using complete_item_id (show, edit, comment, assign, deps, rm, milestone *, status, find) automatically benefit.'
