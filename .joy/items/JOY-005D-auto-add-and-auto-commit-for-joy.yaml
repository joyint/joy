    Done. Implementation:

    1. model/config.rs: AutoGit enum (Off/Add/Commit/Push) with default Add, added to WorkflowConfig as auto-git field. PROBES updated for config hints.

    2. git_ops.rs: New module with auto_git_add(root, paths) and auto_git_post_command(root, summary, identity). Best-effort: warnings on failure, never aborts.

    3. Write helpers instrumented: save_item, update_item, delete_item, save_milestone, update_milestone, delete_milestone, save_release, append_event, update_gitignore_block, init (project.yaml + config.defaults.yaml).

    4. CLI commands instrumented with auto_git_post_command: add, status (incl. start/submit/close/reopen), edit, rm, comment, deps (add/rm), assign/unassign, milestone (add/edit/rm/link/unlink), release create (non-full only), project (set/edit/member add/rm), init.

    5. Commit message format: "joy: <command summary>\n\nCo-Authored-By: <identity>"

    6. config.defaults.yaml and snapshot updated. All 96+19 tests pass, clippy clean.
