- author: horst.schwarz@joydev.com
  date: 2026-03-27T09:59:44.686414121Z
  text: |-
    Config keys in workflow section:
    - auto-add: true|false (default true) -- git add after writing versioned files
    - auto-commit: true|false (default false) -- git commit after each Joy operation
    - auto-push: true|false (default false) -- git push after auto-commit

    Applies to all versioned Joy files: items, logs, milestones, releases, project.yaml, config.defaults.yaml, .gitignore. Does NOT apply to gitignored files (config.yaml, credentials.yaml, .joy/ai/, tool configs).

    Implementation: joy-core write helpers (write_yaml, ensure_gitignore, etc.) check config and call git add. Auto-commit wraps the CLI command execution -- one commit per joy command, not per file. Message format: 'joy: <command summary> <item-id>'.

    Progression: auto-add is safe and low-friction (default on). Auto-commit is opt-in for solo developers who want zero-ceremony. Auto-push is opt-in for teams who want instant sync.
- author: horst.schwarz@joydev.com
  date: 2026-03-27T10:01:53.051624313Z
  text: |-
    Revised: single config key instead of three booleans.

    workflow:
      auto-git: add    # off | add | commit | push

    Each level implies the previous: push = add + commit + push. Default: add (safe, low-friction). Off for users who want full manual control.
- author: ai:claude@joy
  date: 2026-03-27T20:59:51.724473915Z
  text: |-
    Plan:

    1. Add AutoGit enum to model/config.rs: Off | Add | Commit | Push (default: Add)
       - Add auto-git field to WorkflowConfig
       - Each level implies the previous (Push = Add + Commit + Push)
       - Add to PROBES list in probe_string_field for config hints
       - Update config.defaults.yaml with auto-git: add

    2. Add git_ops module in joy-core with:
       - git_add_files(root, paths): stages specific files
       - git_commit(root, message): creates commit
       - git_push(root): pushes to default remote
       - auto_git_add(root, paths): reads config, stages if level >= Add
       - auto_git_post_command(root, summary, item_id): reads config, commits if level >= Commit, pushes if level >= Push

    3. Instrument write helpers in joy-core to call auto_git_add:
       - items::save_item / update_item / delete_item -> git add the item file
       - milestones::save_milestone / update_milestone / delete_milestone -> git add
       - releases::save_release -> git add
       - event_log::append_event -> git add the log file
       - init::update_gitignore_block -> git add .gitignore
       - store::write_yaml for project.yaml, config.defaults.yaml -> git add

    4. Instrument CLI main.rs:
       - After command handler returns Ok, call auto_git_post_command with command summary
       - Message format: "joy: <command summary> <item-id>"
       - Skip for read-only commands (ls, show, log, find, board, roadmap, config get, completions, tutorial, ai check)

    5. Tests:
       - Unit test AutoGit enum serde roundtrip
       - Unit test auto_git_add with a temp git repo
       - Unit test auto_git_post_command commit/push
       - Update config snapshot test

    Approach: git add happens per-file in write helpers (decentralized). Commit/push happens once per command in main.rs (centralized). Config is read once per command. Write helpers get root passed already, they just need to additionally call git add.

    Key decision: write helpers should not fail the command if git add fails. Use best-effort (eprintln warning, continue). Same for commit/push.
- author: ai:claude@joy
