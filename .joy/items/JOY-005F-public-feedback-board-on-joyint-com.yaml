description: 'Add visibility: public as a server-side feature on joyint.com. Public items are mirrored to a read-only feedback board per project. External users (invited or open) can upvote items and leave comments. Items stay in Git for the team but are projected to the web UI for public interaction. First use case: let Jot/Joy early-access users shape the product.'
