description: When a newly-added manage member completes 'joy auth --otp <code>' and sets their passphrase, joy automatically produces an attestation for the founder (the only member still without one) and writes it. Silent, no CLI output. After this, every member in project.yaml has an attestation. Founder is identified as 'the one member without an attestation'.
