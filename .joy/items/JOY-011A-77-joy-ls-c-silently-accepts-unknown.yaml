description: 'Today, ''joy ls -c <unknown-key>'' is silently dropped: ExtraColumns::from_args matches only the literals ''milestone'', ''ms'', ''assignee'', ''parent'' and ignores everything else. Typos and outdated values produce no feedback. Fix: validate every value in --columns against the known set; reject unknown values with a clear error listing valid keys (and any aliases such as ''members'' added by JOY-0115-8B). Integration test: ''joy ls -c bogus'' exits non-zero with the expected error message.'
comments:
- author: ai:claude@joy
  date: 2026-04-25T14:20:11.356028474Z
  text: '[x] ExtraColumns::from_args now returns Result and rejects unknown keys with a clear error listing the valid set (''milestone, ms, assignee, members, parent''). [x] ''joy ls -c bogus'' now exits non-zero with that message; ''joy ls -c assignee,bogus'' fails the same way (one bad value invalidates the whole list). [x] 4 unit tests cover known keys with both aliases (ms, members), unknown key, mixed list with one unknown, empty list. [x] All 270 lib + 66 cli + 2 ai tests green.'
