description: 'Today, ''joy ls -c <unknown-key>'' is silently dropped: ExtraColumns::from_args matches only the literals ''milestone'', ''ms'', ''assignee'', ''parent'' and ignores everything else. Typos and outdated values produce no feedback. Fix: validate every value in --columns against the known set; reject unknown values with a clear error listing valid keys (and any aliases such as ''members'' added by JOY-0115-8B). Integration test: ''joy ls -c bogus'' exits non-zero with the expected error message.'
