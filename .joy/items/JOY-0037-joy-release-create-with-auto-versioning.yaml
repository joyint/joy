  text: '[x] joy release create patch/minor/major with auto-versioning from latest Joy release or git tag fallback. Optional --title, --description, --version. [x] Collects closed items since last release.created event via event log. Groups by type, builds contributor list. [x] joy release show vX.Y.Z reads YAML, joy release show (no arg) computes live preview. [x] joy release ls lists all releases. [x] Logs release.created event. [x] Refactored from old version-tag-based release command to subcommand pattern (create/show/ls).'
