description: joy release create patch/minor/major computes next version from last release, collects items closed since the last release.created event in the log, groups by type, builds contributor list from event log actors, shows preview, writes YAML to .joy/releases/, and logs release.created event. Optional --title, --description, --version (for explicit version like v1.0.0-alpha.1).
comments:
- author: horst.schwarz@joydev.com
  date: 2026-03-22T17:26:48.124498164Z
  text: 'Plan: (1) Add release subcommand to CLI with create, show, ls. (2) create takes bump argument (patch/minor/major) + optional --title, --description, --version. (3) Reads last release.created event from log to determine cutoff timestamp. If no release exists, uses the earliest log entry. (4) Collects all item.status_changed events with ''-> closed'' after cutoff. (5) Loads those items, groups by type, builds contributor list from event actors. (6) Shows preview, writes YAML, logs release.created event.'
