  text: |-
    Argon2id key derivation implemented in auth/derive.rs:
    - Salt: 32-byte random, hex serializable, zeroed on drop
    - DerivedKey: 32-byte Argon2id output, zeroed on drop
    - Params: m_cost=65536 (64 MiB), t_cost=3, p_cost=4
    - Passphrase validation: minimum 6 whitespace-separated words
    - 7 unit tests (salt random, hex roundtrip, deterministic, different salt/passphrase, validation)
