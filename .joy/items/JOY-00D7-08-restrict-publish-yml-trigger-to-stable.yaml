description: Pre-release tags (vX.Y.Z-rc1, vX.Y.Z-test1) should not publish to crates.io because uploaded crate versions are permanent. Tighten the publish.yml tag pattern from 'v[0-9]+.[0-9]+.[0-9]+*' to 'v[0-9]+.[0-9]+.[0-9]+' (no trailing wildcard, so any suffix excludes the tag from publishing). release.yml still fires on pre-release tags so binaries can be tested.
