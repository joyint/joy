id: JOY-0068
title: Vision document as part of a joy product
type: idea
status: new
priority: medium
created: '2026-03-13T22:00:06.431034382Z'
updated: '2026-03-13T22:04:03.471237153Z'
description: The vision could be written by a human with a template provided by joy, or created and maintained from an AI by summarizing documents in the repo or interviewing the product project creator.
comments:
- author: horst.schwarz@joydev.com
  date: '2026-03-13T22:01:22.968524967Z'
  text: 'Two-phase approach: (1) Template: joy init --vision or joy vision init creates a structured vision.md in .joy/ with sections like target audience, problem, solution, principles. No AI needed, useful immediately. Could fit into MS-02 or earlier. (2) AI-assisted: joy ai vision in MS-05 (Agent Mode). AI reads repo, items, milestones and generates/updates the vision document. Or conducts an interactive interview with the product creator. The template phase provides the structure that the AI phase later maintains.'
- author: horst.schwarz@joydev.com
  date: '2026-03-13T22:04:03.471234533Z'
  text: 'Refined to three-phase approach: (1) Template: joy vision init creates an empty structured vision.md in .joy/ with section headings. Minimal, immediate value. (2) Interview: joy vision init --interactive walks the user through each section with guided questions and examples (like npm init). No AI needed, but produces a well-filled document. Builds on the same template structure from phase 1. (3) AI-assisted: joy ai vision in MS-05 reads repo context (items, milestones, code) and generates or updates the vision. Can also conduct an AI-driven interview. Builds on the template structure from phases 1-2.'
