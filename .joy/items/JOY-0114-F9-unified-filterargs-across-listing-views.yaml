description: 'Refactor: extract a single FilterArgs struct (type, status, priority, milestone, members, mine, blocked, tag, version) and embed it in LsArgs and BoardArgs via clap''s command(flatten). Move filter-application logic into a CLI-free joy-core function applying a FilterSpec to a slice of items. Identity-aware resolution (--mine -> -m self) lives in a small adapter that runs in joy-cli. No user-visible behavior change in this story. Snapshot tests cover every flag at the joy-core layer; CLI integration tests verify parity between ls and roadmap.'
comments:
- author: ai:claude@joy
  date: 2026-04-25T13:50:52.763511110Z
  text: 'Plan: (1) New joy_core::filter module with FilterSpec data struct and apply() function; move effective_milestone and is_descendant from joy-cli/ls.rs into it. (2) New joy_cli::commands::filter_args module with FilterArgs (clap Args) and to_spec(identity) -> Result<FilterSpec>; --mine resolves to populating spec.members with the current identity. (3) LsArgs replaces inline filter fields with #[command(flatten)] FilterArgs and uses joy_core::filter::apply() in place of the inline filter loop. (4) Unit tests in joy-core for every filter dimension. (5) Scope clarification: BoardArgs is intentionally NOT modified in this story to preserve the no-UX-change contract; the BoardArgs flatten plus filter application live in JOY-0116-81.'
