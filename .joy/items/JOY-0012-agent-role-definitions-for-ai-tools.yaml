  text: 'Define agent roles that AI coding tools can assume when working with Joy. Each role has a specific interaction level, permissions, and behavioral rules. Roles are configured in joy config (agents.<role>.interaction-level) and defined as tool-specific agent files. Reference implementation: https://github.com/joydev-horst/magna-aip-a3/tree/main/.claude/agents -- working Claude Code agents with role-specific prompts. joy ai setup should generate these agent definitions alongside skills and instructions.'
