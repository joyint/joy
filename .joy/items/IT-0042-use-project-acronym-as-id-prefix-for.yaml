description: 'Make acronym required at init. Use it as prefix for all IDs: items become ACRONYM-XXXX (e.g. JOY-0001), milestones become ACRONYM-MS-XX (e.g. JOY-MS-01). Drop EP/IT distinction -- type lives in YAML. Affects: init (acronym required), ID generation, ID parsing, filenames, all cross-references (parent, deps, milestone links), migration of existing items, tests, snapshots, docs, tutorial.'
