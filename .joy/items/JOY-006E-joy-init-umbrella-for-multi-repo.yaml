description: 'Initialize a Joy project as an umbrella that aggregates multiple sub-repos via git submodules. Creates a .joy/ project designed for cross-cutting planning: strategic items, cross-repo milestones, business-sensitive documents. Sub-repos are linked as submodules and can have their own .joy/ for repo-specific items. Enables private planning over public repos without encryption.'
