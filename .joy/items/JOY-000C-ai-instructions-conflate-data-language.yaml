id: JOY-000C
title: AI instructions conflate data language and conversation language
type: bug
status: closed
priority: medium
effort: 2
created: 2026-03-20T18:56:52.257223402Z
updated: 2026-03-21T15:09:03.425300582Z
comments:
- author: horst.schwarz@joydev.com
  date: 2026-03-20T18:56:59.605734240Z
  text: 'The AI instructions say ''all titles, descriptions, and comments must be in English'' but some tools (especially Vibe/Devstral) interpret this as ''respond in English''. The instructions need to clearly distinguish: (1) Joy data (titles, descriptions, comments) must be in the project language (project.language setting), (2) conversation with the user should be in the user''s language (auto-detected from their input). Claude Code and Copilot handle this correctly by default, Vibe responds entirely in English even when the user writes in German.'
- author: horst.schwarz@joydev.com
  date: 2026-03-20T18:58:34.582244530Z
  text: 'Confirmed by Vibe: it explicitly follows the project language setting (Language: en) for conversation, not just for Joy data. When asked, Vibe explains: ''Das Joy Projekt ist auf Englisch eingestellt (Language: en). Ich folge dieser Einstellung fuer Konsistenz.'' This confirms the instructions need to explicitly separate project data language from conversation language.'
- author: horst.schwarz@joydev.com
  date: 2026-03-21T15:08:31.783428181Z
  text: 'Plan: Fix both source files in data/ai/. (1) instructions.md line 58 already separates data vs conversation language well. (2) skills/joy/SKILL.md line 99 says ''All written artifacts must use the project language'' but has no explicit rule about conversation language. Fix: add a clear sentence that conversation language follows the user''s language, not the project language. Also update line 61 which says ''titles in English'' -- should reference project language instead of hardcoding English.'
- author: horst.schwarz@joydev.com
  date: 2026-03-21T15:09:00.735695671Z
  text: '[x] Fixed data/ai/skills/joy/SKILL.md: added explicit conversation language rule, changed hardcoded ''English'' to project language reference. [x] Fixed data/ai/instructions.md: made the separation between artifact language and conversation language much more explicit with bold heading and clear examples.'
