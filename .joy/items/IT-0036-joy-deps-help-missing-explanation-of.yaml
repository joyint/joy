description: The help for 'joy deps --add' does not explain the semantics. Running 'joy deps --add DEP_ID ITEM_ID' - which item depends on which? The output clarifies it after the fact but the help should explain upfront, e.g. 'ITEM depends on ADD'.
comments:
- author: horst.schwarz@joydev.com
  date: '2026-03-11T14:38:30.128321263Z'
  text: 'Solution: Add after_help to deps command explaining direction semantics with examples. Improve --add/--rm help text to clarify that ID is the item and ADD/RM is what it depends on. E.g. ''joy deps IT-0002 --add IT-0001'' means IT-0002 depends on IT-0001 (IT-0001 must be done first).'
