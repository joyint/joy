description: Define the 7 fixed capabilities (conceive, plan, design, implement, test, review, document) in joy-core. Add type-to-capability mapping (required/optional per item type). Capabilities are not configurable -- they are a fixed vocabulary shared across all Joy projects.
comments:
- author: horst.schwarz@joydev.com
  date: 2026-03-25T18:06:36.983164630Z
  text: |-
    Design decisions from planning session 2026-03-25:

    1. Capabilities are always written into the item YAML at creation time. No implicit resolution from type defaults at runtime. This makes items self-describing and stable across Joy version changes.

    2. Item templates live in data/items/*.yaml (embedded in the binary, same mechanism as other data/ files). Each template defines required and optional capabilities for that type. joy add reads the template and writes required capabilities into the new item.

    3. The item has a flat capabilities list -- no required/optional split. Optional capabilities only exist in the template as suggestions for joy add (e.g. joy add story --capabilities plan,design,implement,review adds design beyond the default).

    Example template (data/items/story.yaml):
      type: story
      capabilities:
        required: [plan, implement, review]
        optional: [design, test, document]

    Example created item:
      capabilities: [plan, implement, review]
- author: horst.schwarz@joydev.com
  date: 2026-03-25T18:10:09.784359136Z
  text: 'Update: optional capabilities removed from templates. Templates only contain default capabilities as a flat list. No required/optional split. Users override with joy edit --capabilities when needed. Example template data/items/story.yaml: capabilities: [plan, implement, review]'
