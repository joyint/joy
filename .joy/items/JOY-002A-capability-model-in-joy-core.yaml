- author: horst.schwarz@joydev.com
  date: 2026-03-25T18:52:17.142646259Z
  text: Done. Capability enum (7 values) in model/item.rs with Display, FromStr, serde. Item templates in data/items/ using MiniJinja with _base.yaml shared structure. templates.rs renders items from templates. capabilities field on Item (Vec<Capability>, backward-compatible via serde default). joy add uses templates, supports --capabilities override. joy edit supports --capabilities. ADR-019 for MiniJinja. All 110 tests pass, clippy clean.
