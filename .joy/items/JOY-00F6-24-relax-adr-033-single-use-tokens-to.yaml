description: |-
  Revert ADR-033 §3 only. §1 (stable per-(human, AI) delegation key) and §2 (ephemeral session keypair bound to JOY_SESSION) remain authoritative.

  Motivation: the single-use + 2h issuance TTL combination from §3 produced a level of ceremony that is disproportionate to the protection it adds. The AI needs a fresh token per session, the human re-enters the passphrase often, and the settings.json workaround (JOY-00C5-70) reintroduces a disk credential that contradicts §2. Relaxing §3 to multi-use within 24h eliminates the ceremony while keeping §1 and §2's security properties intact.

  Code scope (branch rework/auth-trust-model, off main):

  1. Remove joy_core::auth::consumed module and all references. No more consumed-tokens.json, no single-use check in auth_with_token.

  2. Unify token TTL to a single configurable value, default 24h. joy auth token add uses 24h default (was 2h per ADR-033 §3).

  3. Tokens are multi-use within their TTL: auth_with_token no longer marks tokens consumed and no longer rejects previously-redeemed token IDs.

  4. Revert JOY-00C5-70: remove write_session_env_for_member and its call site in joy auth --token. joy ai setup/update no longer writes JOY_SESSION into ~/.claude/settings.json, .qwen/settings.json, .github/copilot/settings.json, .vibe/.env. §2 requires the private key to live only in env, writing it to disk breaks that property. AI tool harnesses handle env propagation themselves.

  5. Update embedded AI instruction templates (crates/joy-core/templates/ai/instructions.md and .github/copilot-instructions.md if committed): drop single-use and 2h-TTL language, reflect multi-use 24h TTL. Keep the JOY_SESSION / eval pattern description -- that is §2 behaviour and stays.

  Out of scope (separate items):
  - JOY-00F3-AE (joy auth --user)
  - JOY-00F4-CF (member show Auth check divergence)
  - JOY-00F5-33 (session filename hash)
  - JOY-00EF-E5 (inline-auth for joy auth token add)

  Tests: cargo test --workspace and bats tests/integration/*.bats must pass. Some BATS tests explicitly exercised single-use behaviour (delegation token is single-use, announces 2h default TTL) -- those tests get updated to reflect the new multi-use 24h model.

  Doc companion (tracked separately in JI): ADR-034 text, ADR-033 header update to "Superseded for §3", Auth.md minimal amendment, ADR-023 see-also note.
