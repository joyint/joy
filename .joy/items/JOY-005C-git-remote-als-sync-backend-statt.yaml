id: JOY-005C
title: Git-Remote als Sync-Backend statt Custom Server
type: idea
status: new
priority: medium
deps:
- JOY-005B
created: '2026-03-12T21:08:10.430528950Z'
updated: '2026-03-12T21:17:28.650564099Z'
description: |-
  Idee: Statt einen eigenen Sync-Server mit Custom-Protokoll zu bauen, Git selbst als Sync-Backend nutzen. Die Daten liegen bereits als YAML-Dateien im Git-Repo -- warum nicht einfach git push/pull als Sync-Mechanismus verwenden?

  Kontext: Haengt zusammen mit JOY-005B (Jo: Personal Todo Tool als gemeinsame Plattform mit Joy). Wenn Joy und Jo dieselbe Datenbasis teilen (YAML-Items in .joy/), koennte Git als gemeinsames Sync-Backend fuer beide Produkte dienen.

  Was das sofort loest:
  - Kein Custom-Sync-Protokoll noetig. Push/Pull = git push/pull.
  - Kein eigener Server zu bauen. Jeder Git-Host funktioniert: GitHub, Gitea, eigener Server.
  - History gratis via git log statt eigenem Audit-Log.
  - Conflict Detection gratis -- Git merkt wenn zwei Leute dasselbe Item aendern.
  - Self-Hosting = Gitea installieren, kein Joy-Server noetig.
  - joyint.com waere Managed Git Hosting mit huebschem Frontend. Massiv weniger Infrastruktur.
  - ADR-004 (Portal as Source of Truth) bleibt erfuellt -- der Git-Remote ist die Source of Truth.

  Offene Probleme:
  1. Mobile App: Kein git pull auf iOS moeglich. Die App braucht eine API, also doch einen Server -- zumindest eine duenne REST-Schicht die serverseitig Git-Operationen ausfuehrt.
  2. Reminders/Notifications: Git ist passiv. Ein separater Prozess muss das Repo ueberwachen und Push-Notifications ausloesen.
  3. Merge-Konflikte: Gleichzeitige Edits am selben Item fuehren zu YAML-Merge-Conflicts. Fuer Entwickler loesbar, fuer App-UX eine Katastrophe.
  4. Latenz: Git push/pull ist nicht real-time. Fuer PM ok, fuer Todo-Sync zwischen Geraeten (Handy abhaken, am Laptop sehen) moeglicherweise zu langsam.

  Loesungsvorschlag -- Hybridmodell:

  CLI (joy/jo) ---- git push/pull ----> Git Remote
  Mobile/Web App ---- REST API ----> Thin API Server ---- git commit/push ----> Git Remote
  Notification Service <-- watches repo -- Git Remote

  - CLI-User syncen direkt per Git. Kein Server noetig.
  - App-User gehen ueber eine duenne API die serverseitig Git-Operationen macht.
  - Notification Service ueberwacht das Repo auf faellige Reminders.
  - joyint.com ist genau diese Kombination: Git-Hosting + duenne API + Notifications.

  Kernvorteil: Der Server ist kein vollstaendiger Application Server mit eigener Datenbank, sondern nur ein Gateway zu Git + ein Cron fuer Notifications. Massiv weniger Komplexitaet als ein eigener Sync-Server mit Custom-Protokoll.
