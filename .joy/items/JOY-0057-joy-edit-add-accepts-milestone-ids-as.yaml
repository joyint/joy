id: JOY-0057
title: joy edit/add accepts milestone IDs as parent without validation
type: bug
status: closed
priority: medium
created: '2026-03-12T05:41:22.016417658Z'
updated: '2026-03-12T05:43:27.515848567Z'
description: Setting --parent to a milestone ID (e.g. JOY-MS-03) is silently accepted but causes the item to disappear from tree views. Parent must be a valid item ID. Add validation in edit and add commands.
comments:
- author: horst.schwarz@joydev.com
  date: '2026-03-12T05:42:18.973145826Z'
  text: 'Fix: validate parent ID in both add and edit commands. Call items::load_item() to verify the parent exists as an item. Reject with error if not found.'
