comments:
- author: ai:claude@joy
  date: 2026-03-28T19:15:42.045828210Z
  text: |-
    When joy ai reset removes an AI tool configuration, it should also:
    1. Remove the AI member's public_key from project.yaml (invalidates all delegation tokens signed for that member)
    2. Remove the AI member's session file if one exists
    3. Optionally remove the AI member from project.yaml entirely

    Without this, stale tokens and sessions could persist after a tool is deconfigured. The token invalidation happens implicitly via public_key removal -- validate_token checks the delegating human's key, but the AI member check in auth_with_token verifies the AI is still registered.
- author: ai:claude@joy
  date: 2026-03-28T19:15:51.990875728Z
  text: 'Integration test needed: joy ai setup -> joy auth create-token -> joy ai reset -> verify token is invalid and session removed.'
