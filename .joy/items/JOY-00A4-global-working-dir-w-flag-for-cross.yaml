description: Add a global -w/--working-dir flag that temporarily changes the working directory before executing any Joy command. Allows cross-project queries without cd, e.g. joy ls -w ../joy or joy roadmap -w ../platform. Error if target is not a Joy project. Replaces the need for umbrella-specific features (init --umbrella, project link, ls --repo).
