description: 'When Crypt is active, a member''s passphrase change re-derives their public_key, which invalidates their wrap of the project key. Crypt must re-wrap on every change. Integration point: the passphrase-change core in auth layer (from JOY-0073). Dependencies: JOY-0073 (passphrase change core), JOY-00BA (local key management for E2E encryption), JOY-00BB (client-side crypto crate), JOY-00BC (recovery key at crypt init). Without Crypt active, this is a no-op - the hook sits idle.'
