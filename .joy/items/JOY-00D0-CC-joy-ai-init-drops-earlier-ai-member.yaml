description: |-
  ## Symptom

  When running ``joy ai init`` in a project where multiple AI tools (e.g. Claude Code and GitHub Copilot) are detected and confirmed for setup, only one of the AI members ends up registered in ``.joy/project.yaml``. The other member entry is missing even though the corresponding tool config (CLAUDE.md, copilot-instructions.md) was written.

  Reported via Horst on 2026-04-13: after a single ``joy ai init`` run, ``joy project member`` only listed ``ai:copilot@joy``; ``ai:claude@joy`` was missing and had to be added manually.

  ## Suspected cause

  ``setup_new_tools`` loads project.yaml once at the start of the loop, accumulates members in memory, and writes once at the end. The merge logic in ``write_yaml_preserve`` may drop entries, or one of the per-tool ``configure_*`` calls may be writing project.yaml underneath us. Needs reproduction first.

  ## Plan

  1. Add a bats test that uses fake ``claude`` and ``gh`` shims on PATH so the detection succeeds, runs ``joy ai init`` once, and asserts both ``ai:claude@joy`` and ``ai:copilot@joy`` are present in project.yaml.
  2. If the test reproduces the bug, fix the root cause.
  3. If the test passes, ask the reporter for more detail (was a tool already configured before the run? was ``joy ai update`` involved?).
