  text: |-
    [x] Reproduced via bats test 'registers member for already-configured tool missing from project.yaml': the bug surfaces when is_tool_configured(root, id) returns true (e.g. .claude/CLAUDE.md exists from a prior joy ai update or a copied repo) but the corresponding ai:<tool>@joy member is not yet in project.yaml. Old setup_new_tools used 'continue' on that branch, so member registration was skipped entirely.
    [x] Fix: refactored the per-tool loop in setup_new_tools so member registration runs for both branches (newly configured and already configured). The 'should_register' flag is true whenever the tool is in scope; the actual insert still guards on '!project.members.contains_key(...)' so it's idempotent.
    [x] Tests: 2 new bats tests in tests/integration/ai.bats use fake claude/gh shims to make detect_* succeed, then assert both ai:claude@joy and ai:copilot@joy land in project.yaml. just check passes.
