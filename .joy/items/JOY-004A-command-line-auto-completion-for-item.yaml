id: JOY-004A
title: Command line auto completion for item and milestone ids
type: idea
status: closed
priority: medium
created: '2026-03-11T16:02:20.900164705Z'
updated: '2026-03-12T07:36:12.530727965Z'
description: It would be very helpful if all commands of joy with an item or milestone id would support the input of the id with autocompletion. A tab click should for example insert a ACR-00 if there are only items with a smaller id then ACR-00FF.
comments:
- author: horst.schwarz@joydev.com
  date: '2026-03-12T06:49:27.208303588Z'
  text: |-
    Assessment and solution approach:

    Three levels possible:
    1. Static completion (already have via clap)
    2. Dynamic ID completion: Tab scans .joy/items/ and .joy/milestones/ and suggests IDs. Sweet spot -- 90% of the value, ~1-2 days effort.
    3. Fuzzy match with titles (e.g. cra<TAB> -> JOY-003F). Much more complex, later.

    Implementation level 2:
    - clap_complete with custom completer for ID arguments
    - Completer reads .joy/items/ and .joy/milestones/ filenames, extracts IDs
    - Shell setup via joy completions <shell> (bash/zsh/fish)

    Todos:
    - [ ] Implement custom completer that reads IDs from .joy/
    - [ ] Attach to all commands with ID arguments
    - [ ] Update joy completions output if needed
    - [ ] Test with bash and zsh
- author: horst.schwarz@joydev.com
  date: '2026-03-12T06:59:51.868971953Z'
  text: |-
    Implementation complete:
    - [x] Implement custom completer that reads IDs from .joy/
    - [x] Attach to all commands with ID arguments
    - [x] Update joy completions output if needed (not needed, CompleteEnv runs in parallel)
    - [x] Test with bash and zsh (bash tested, zsh analogous)

    Dynamic completion via CompleteEnv + ArgValueCompleter. Activation: source <(COMPLETE=bash joy) in .bashrc.
