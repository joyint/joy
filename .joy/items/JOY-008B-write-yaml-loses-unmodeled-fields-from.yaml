- author: ai:claude@joy
  date: 2026-03-28T20:48:06.661741552Z
  text: |-
    store::write_yaml serializes the Project struct back to YAML, but the Project struct does not model all fields in project.yaml. The release.version-files config is stored as raw YAML but not in the Project struct, so it gets silently dropped on write.

    This affected us when joy auth --token wrote the AI member's public_key -- the entire project.yaml was re-serialized, losing release.version-files.

    Root cause: any command that reads project.yaml into Project struct and writes it back will lose unmodeled fields.

    Fix options:
    1. Add release config to Project struct (models it properly)
    2. Use YAML-aware merge instead of full re-serialization (preserve unknown keys)
    3. Read-modify-write at YAML level instead of struct level

    Option 2 or 3 is more robust. Option 1 is simpler but requires adding every new config key to the struct.

    Integration test needed: write project with extra YAML fields, call a command that modifies project.yaml, verify extra fields survived.
- author: ai:claude@joy
  date: 2026-03-28T21:09:08.304064709Z
  text: "Fixed with three changes:\n\n1. write_yaml_preserve() in store.rs: preserves top-level YAML keys not modeled in the struct. Uses the struct's values as authoritative, then adds back any unknown keys from the original file. All project.yaml writes now use this function.\n\n2. Session path: ~/.local/state/joy/sessions/ instead of ~/.config/joy/sessions/ (XDG_STATE_HOME compliant -- sessions are runtime state, not user config)\n\n3. Session filename: SHA-256 hash of project_id:member (first 12 bytes, hex) instead of human-readable names. Privacy-safe, deterministic.\n\n3 new integration tests:\n- project.yaml extra fields survive auth init\n- project.yaml extra fields survive member add  \n- project.yaml extra fields survive auth reset\n\n84 total integration tests green."
