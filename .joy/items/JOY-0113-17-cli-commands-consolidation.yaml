description: 'Unify the CLI surface across listing commands (ls, board, roadmap) so the same filters, completions, and help patterns apply everywhere. Includes a member filter (-m), milestone short-flag rebinding (-m -> -M), board filter parity, member and item ID completion fixes, help-as-subcommand on every command, and stricter column validation. Rationale: with multi-person projects becoming common, missing a member filter is a daily friction; the broader inconsistency between ls, board, and roadmap is a long-standing rough edge.'
