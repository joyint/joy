description: Premium (Judge tier) layer on top of OSS attestations. Pre-commit git hook invokes Judge to verify that every member-lifecycle change in project.yaml corresponds to a valid event in the event log. Closes the gap where an attacker with push access could coordinate yaml and event-log manipulation. Depends on JOY-0074 (log hash chain) for event authenticity. Premium feature; the OSS-only attestation layer (JOY-00FA-A5) covers the baseline 80% threat model without requiring Judge.
