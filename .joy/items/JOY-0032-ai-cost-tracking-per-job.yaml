description: Track token consumption and cost per AI job. Agents report tokens_in, tokens_out, cost, and currency when completing a job. joy show aggregates cost per item across all jobs. Feeds into the JOYC settlement layer and governance reporting (AI Decision Audit Log). No human cost tracking -- Joy is not a time-tracking tool.
