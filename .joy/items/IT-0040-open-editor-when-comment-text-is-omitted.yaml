description: 'When ''joy comment <ID>'' is called without TEXT, open the configured editor for input. Editor resolution order: (1) --editor flag, (2) editor field in config, (3) $VISUAL, (4) $EDITOR, (5) error with hint. Empty file = abort. Add ''editor'' field to Config with suggested values in default config comment. Supported editors: nvim, vim, vi, nano, hx, code --wait.'
