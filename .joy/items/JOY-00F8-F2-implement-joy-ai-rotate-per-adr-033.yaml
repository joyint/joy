  text: |-
    Plan: Implement 'joy ai rotate <ai-member>' per ADR-033.

    Subcommand lives under 'joy ai rotate' next to existing init/update/reset. Requires ManageProject capability (same as token add).

    Flow:
    1. Authenticate acting human (passphrase, same pattern as token add).
    2. Verify <ai-member> is registered and has an ai_delegations entry under the acting human. If no entry: bail with 'no delegation to rotate, run joy auth token add first' (this is the (None pub, None priv) bootstrap case).
    3. Generate fresh Ed25519 keypair.
    4. Write new private to ~/.local/state/joy/delegations/<project>/<ai>.key (mode 0600, overwriting any existing file -> covers (Some,None), (Some,Some mismatch), (Some,Some match) uniformly).
    5. Update project.yaml: members[<human>].ai_delegations[<ai>].delegation_key = new_pub; rotated = now. Single write via write_yaml_preserve.
    6. Single commit via auto_git_add.
    7. Print: 'Rotated delegation for <ai>. Prior tokens and sessions are invalidated. Issue a fresh token with joy auth token add <ai>.'

    Error-message rework in auth.rs:
    - Fall 1 (Some,Some mismatch, Z. 534): 'Delegation state for X is inconsistent (local private key does not match the public key in project.yaml). Run joy ai rotate X to replace the keypair with a fresh one. Prior tokens are invalidated.'
    - Fall 2 (Some,None, Z. 548): 'Local delegation private key for X is missing on this machine. Run joy ai rotate X to generate a fresh pair. Note: this invalidates any prior tokens and any copy of the key on other machines.'
    - Fall 3 (None,Some, Z. 554): no mention of rotate - this is a manual-resolution case. 'Local delegation key for X exists but project.yaml has no entry. Remove the orphan key at <path> and re-run joy auth token add, or investigate why the yaml entry is missing.'

    Tests:
    - Unit tests for any new helpers.
    - Integration bats tests: rotate succeeds on working delegation (new key on disk, new public in yaml, rotated set, old token fails project_id/delegation_key check); rotate from (Some,None) state; rotate errors when no ai_delegations entry exists.

    Preserves ADR-033 invariants:
    - One write per (human,AI) pair at rotation events only - no new project.yaml write surface.
    - Single commit, stable BTreeMap ordering - no merge conflict surface added.
    - delegation_key, created, rotated fields already exist in AiDelegationEntry, no model change needed.
