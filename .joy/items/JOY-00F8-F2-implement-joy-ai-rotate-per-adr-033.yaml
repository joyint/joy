description: |-
  Implement 'joy ai rotate <ai-member>' per ADR-033: replaces an existing (human, AI) delegation keypair with a fresh one. Updates project.yaml (new delegation_key, rotated timestamp) in a single commit. Any tokens signed by the prior keypair, and any sessions bound to those tokens, are invalidated.

  Preconditions: project.yaml has a delegation entry for this (human, AI) pair. Works regardless of the local private key state (present, missing, or mismatched) - rotation overwrites whatever was there.

  Scope also includes correcting the three desync error messages in auth.rs (lines 534/548/554) so they accurately describe the recovery action for each case and do not misuse 'rotate' semantics for the (None pub, Some priv) case, which is a manual-resolution scenario rather than a rotation.

  Use cases:
  - Deliberate security rotation (compromise, policy).
  - Recovery of desync cases where a prior keypair existed (mismatch, or private lost on this machine).
  - Explicit revocation of prior tokens for a (human, AI) pair without removing the member entirely (for full removal, joy ai reset remains the command).
