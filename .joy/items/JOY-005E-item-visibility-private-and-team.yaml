description: 'Add a visibility field to items with two levels: private (encrypted, only creator can read) and team (all project members, current default). Private items are stored as encrypted YAML files -- only the creator holds the key. Builds on the planned E2E encryption infrastructure. No server dependency, works purely in Git.'
