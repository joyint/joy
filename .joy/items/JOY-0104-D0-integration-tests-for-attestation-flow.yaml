    Plan: Write tests/integration/attestation.bats upfront covering all 8 scenarios. Tests initially fail since the feature doesn't exist yet - they serve as the TDD contract for the subsequent child items. Each child item implements against them until all 8 are green.

    Test scenarios (mapped 1:1 to the 8-point attestation design):
    1. joy init creates founder without attestation
    2. joy project member add creates OTP + attestation signed by founder
    3. joy auth --otp sets passphrase and silently reverse-attests founder
    4. Subsequent joy project member add works without further reverse-attestation
    5. joy project member rm <self> blocked with manage-list error
    6. Manage removing another member inherits the removed member's attestations
    7. Manually injected member without attestation fails joy auth with clear error
    8. Tampered attestation signature fails joy auth
