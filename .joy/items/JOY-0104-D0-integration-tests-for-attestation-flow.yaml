    Test layout:
    - Scenario 1: founder-without-attestation invariant (1 test, currently green by default)
    - Scenario 2: member add -> OTP + attestation (2 tests)
    - Scenario 3: OTP redemption -> passphrase + reverse-attestation (1 test)
    - Scenario 4: subsequent adds do not re-attest founder (1 test)
    - Scenario 5: self-remove blocked (1 test)
    - Scenario 6: manage remove inherits attestations (1 test)
    - Scenario 7: manually injected member rejected at auth (1 test)
    - Scenario 8: tampered signature rejected at auth (1 test)
