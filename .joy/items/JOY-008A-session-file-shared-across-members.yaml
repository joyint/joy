- author: ai:claude@joy
  date: 2026-03-28T20:47:53.027735125Z
  text: |-
    Session files are stored per project ID (sessions/JOY.json), not per member. When a second member authenticates (e.g. AI via token), their session overwrites the first member's session file. This means only one member can have an active session at a time per project.

    Fix: include member ID in session filename, e.g. sessions/JOY--horst.schwarz@joydev.com.json

    Integration test needed: two members authenticate, verify both sessions exist independently.
- author: ai:claude@joy
  date: 2026-03-28T20:57:12.046941537Z
  text: |-
    Fixed: session files now per member, not per project.

    Filename: sessions/{project_id}--{member}.json (@ replaced with _at_)
    Example: JOY--horst.schwarz_at_joydev.com.json

    load_session and remove_session now take member as second parameter.
    All callers updated: identity.rs, auth.rs, deauth.rs, ai.rs, project.rs.

    2 new integration tests:
    - two members can have independent sessions
    - deauth only removes own session
