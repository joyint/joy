description: Implement joy release as a first-class concept. Releases are generated from the event log (items closed since last release.created event), stored as versioned YAML snapshots in .joy/releases/, and provide the bridge between Joy items and Git version tags. Releases list contributors (human:/agent:) with item counts and group items by type.
