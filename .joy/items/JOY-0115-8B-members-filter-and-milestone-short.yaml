  text: '[x] FilterSpec.members is now a MemberFilter enum (Any/Specific/Unassigned/AnyAssigned). [x] Added -m, --members <SPEC> with comma-separated values; tokens ''me'', ''none''/''unassigned'', and ''*'' parsed in FilterArgs::to_spec. [x] BREAKING: -m short flag now binds to milestone; previous -m for milestone moves to -M; --mine becomes long-only. [x] --mine resolves symmetrically: returns the human ID, the AI ID (if any), and all sibling AIs the human has delegated to. [x] -c columns accepts ''members'' as alias for ''assignee''. [x] 9 unit tests for token parsing in filter_args.rs; 4 unit tests for MemberFilter variants in joy-core/filter.rs; full suite green. [x] Manual smoke checks: -M JOY-MS-01, -m horst.schwarz@joydev.com, -m none, -m ''*'', --mine, -c members all behave as designed. [!] CHANGELOG entry not added: joy has no CHANGELOG file; release notes are derived from closed items per JOY-003D. The ''BREAKING'' marker is in the conventional-commit footer instead.'
