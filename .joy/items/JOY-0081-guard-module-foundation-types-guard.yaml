    Implemented guard module foundation:
    - Guard struct with new(project) and load(root) constructors
    - Action enum: CreateItem, UpdateItem, DeleteItem, ChangeStatus, AssignItem, AddComment, ManageProject, ManageMilestone, CreateRelease, StartJob
