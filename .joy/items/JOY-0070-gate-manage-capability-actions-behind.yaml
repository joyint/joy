  text: |-
    Gate manage actions behind authentication implemented:

    Identity:
    - authenticated field added to Identity struct
    - resolve_identity_with() checks for active session and sets authenticated=true
    - check_session() validates session against member's public key

    Guard:
    - Manage actions (ManageProject, ManageMilestone, CreateRelease) require authentication
      when auth is active (any member has public_key set)
    - Unauthenticated manage attempts -> Deny with 'must authenticate' message

    Token-based auth flow (joy auth with --token or JOY_TOKEN):
    - joy auth reads --token flag or JOY_TOKEN env var
    - Decodes delegation token, validates against delegating human's public key
    - Creates session for AI member (deterministic keypair from token seed)
    - Logs auth.session_created event

    New EventType: AuthSessionCreated

    77 integration tests, all passing.
