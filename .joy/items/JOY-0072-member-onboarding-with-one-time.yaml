- author: horst.schwarz@joydev.com
  date: 2026-03-30T19:43:05.181702830Z
  text: 'Approach: joy project member add generates a one-time password (OTP) and stores its hash in the member''s otp_hash field (already exists in Member struct). Admin shares the OTP out-of-band. New member runs joy auth --otp <code> which verifies the hash, then forces immediate passphrase setup via joy auth init. OTP is deleted after successful passphrase creation. Standard invite-with-forced-password-change pattern. No new data structures needed -- otp_hash field is already in place.'
- author: ai:claude@joy
  date: 2026-04-20T17:26:01.704453063Z
  text: 'Scope note: JOY-0072 is extended by the attestation epic JOY-00FA-A5. Specifically, ''joy project member add'' now also writes an attestation (JOY-00FC-1D), and ''joy auth --otp'' performs founder reverse-attestation on first redemption by a manage member (JOY-00FD-93). Plan comment to follow when implementation starts.'
- author: ai:claude@joy
  date: 2026-04-20T17:35:53.405505073Z
  text: 'Plan: Extend joy auth with --otp flag. ''joy auth --otp CODE --passphrase NEW'' verifies OTP against otp_hash, derives Argon2id key from new passphrase, sets the member''s public_key and salt, clears otp_hash, establishes a session. Implementation shares core with joy auth init but entry gate is OTP rather than ''this is my first time''. Tightly coupled with JOY-00FC-1D (OTP generation side).'
- author: ai:claude@joy
  date: 2026-04-20T17:56:24.933468684Z
  text: |-
    [x] --otp flag on 'joy auth'. 'joy auth --otp <code> --passphrase <new>' verifies OTP against otp_hash, derives fresh keypair from new passphrase, writes public_key/salt, clears otp_hash, establishes session.
    [x] 1 attestation.bats test green (otp redemption sets passphrase silently).
