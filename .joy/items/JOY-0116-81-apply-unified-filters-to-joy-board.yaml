  text: '[x] Removed ''all'' from FilterArgs to disambiguate it from BoardArgs::all (which controls per-column item-count limit, not closed/deferred inclusion). FilterArgs::to_spec now takes an explicit include_closed parameter; ls passes (args.all || status_set), board passes true unconditionally (board always shows all status columns). [x] BoardArgs flattens FilterArgs and board::run applies joy_core::filter::apply before status grouping. [x] Smoke checks: ''joy board -m *'' shows only assigned items, ''joy board -T bug -p high'' shows only high-priority bugs, ''joy board'' default unchanged. [x] Card rendering enrichment (assignee initials on cards) intentionally deferred -- the filter surface parity is the load-bearing change; visual enrichment is non-blocking and can land separately if needed. [x] Full test suite green (270 lib + 47 cli + 2 ai).'
