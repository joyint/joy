description: 'The publish recipe only catches ''is already uploaded'' (post-upload registry rejection). cargo also has a pre-upload check against the registry index that errors with ''already exists on crates.io index''. v0.8.4 publish workflow failed on joy-ai because the second variant slipped through, leaving the workflow red even though all three crates were already published. Fix: extend the regex to match both variants.'
