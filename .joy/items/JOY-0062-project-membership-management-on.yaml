description: 'Manage project members and roles on joyint.com. Invite users by email, assign roles (member, admin, external). Server uses membership to enforce visibility levels: team items visible to members, public items visible to invited externals or everyone. Foundation for the public feedback board and role-based access control beyond Git repo permissions.'
