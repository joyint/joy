description: 'Link a sub-repo (git submodule) to the umbrella project. Registers it so Joy can track which items belong to which repo. Usage: joy project link joy/ --remote github.com/joyint/joy.git. Enables filtering items by sub-repo and cross-repo dependency tracking.'
